<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Generator</title>
  <meta name="google-adsense-account" content="ca-pub-3039806351490146">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3039806351490146"
     crossorigin="anonymous"></script>
  <link href='style.css' rel='stylesheet'>
</head>
<body>
  <div class="container">
    <h1>Color Palette Generator</h1>
    <p class="site-description">A simple tool for designers and developers to quickly find and copy colors for digital projects, including web design.</p>
    
    <div class="controls">
      <button onclick="renderPalette('pastel')">Pastel</button>
      <button onclick="renderPalette('muted')">Muted</button>
      <button onclick="renderPalette('red')">Red</button>
      <button onclick="renderPalette('pink')">Pink</button>
      <button onclick="renderPalette('orange')">Orange</button>
      <button onclick="renderPalette('yellow')">Yellow</button>
      <button onclick="renderPalette('purple')">Purple</button>
      <button onclick="renderPalette('green')">Green</button>
      <button onclick="renderPalette('blue')">Blue</button>
      <button onclick="renderPalette('brown')">Brown</button>
      <button onclick="renderPalette('white')">White</button>
      <button onclick="renderPalette('gray')">Gray</button>
    </div>

    <div class="mode-switch">
      <button id="list-mode-btn" class="active" onclick="setViewMode('list')" aria-label="List View">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
      </button>
      <button id="grid-mode-btn" onclick="setViewMode('grid')" aria-label="Grid View">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
      </button>
    </div>

    <div id="palette" class="palette-grid"></div>
    
    <footer>
      <p>Contact: <a href="mailto:seizeyaks@gmail.com">seizeyaks@gmail.com</a> | <a href="privacy.html">Privacy Policy</a></p>
      <p>&copy; 2026 seizeyaks</p>
    </footer>
  </div>
  <button id="to-top-btn">Top</button>
  <script defer type="text/javascript" src="main.js"></script>
</body>
</html>
